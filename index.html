<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Jari Interaktif</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        #status { position: fixed; top: 20px; left: 20px; color: white; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="status">Status: Menunggu Kamera...</div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');

    let lastSpeech = "";
    let isSpeaking = false;

    // Inisialisasi Suara
    const synth = window.speechSynthesis;
    function speak(text) {
        if (synth.speaking || lastSpeech === text) return;
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'id-ID';
        utter.onend = () => { isSpeaking = false; lastSpeech = ""; };
        lastSpeech = text;
        isSpeaking = true;
        synth.speak(utter);
    }

    function setupCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', setupCanvas);
    setupCanvas();

    function drawSensor(x, y, color, label) {
        ctx.beginPath();
        ctx.arc(x, y, 40, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.6;
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 5;
        ctx.stroke();
        
        ctx.globalAlpha = 1.0;
        ctx.fillStyle = "white";
        ctx.font = "bold 20px Arial";
        ctx.textAlign = "center";
        ctx.fillText(label, x, y - 50);
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults((results) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        statusDiv.innerText = "Sensor Aktif: Gerakkan Jari Anda";

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];

            // Titik Ujung Jari
            const thumb = landmarks[4];  // Jempol
            const index = landmarks[8];  // Telunjuk
            const middle = landmarks[12]; // Tengah
            const pinky = landmarks[20];  // Kelingking

            // Cek apakah jari terangkat (y lebih kecil berarti lebih tinggi di layar)
            const isThumbUp = thumb.y < landmarks[3].y;
            const isIndexUp = index.y < landmarks[6].y;
            const isMiddleUp = middle.y < landmarks[10].y;
            const isPinkyUp = pinky.y < landmarks[18].y;

            // Logika Sensor Berdasarkan Rumus
            
            // 1. Dua Jari (Telunjuk & Tengah) - TERIMAKASIH
            if (isIndexUp && isMiddleUp && !isPinkyUp) {
                drawSensor(index.x * canvas.width, index.y * canvas.height, "white", "TERIMAKASIH");
                speak("Terima kasih");
            } 
            // 2. Jari Kelingking - PERKENALKAN
            else if (isPinkyUp && !isIndexUp && !isMiddleUp) {
                drawSensor(pinky.x * canvas.width, pinky.y * canvas.height, "yellow", "PERKENALKAN");
                speak("Perkenalkan");
            }
            // 3. Jari Jempol - AKU
            else if (isThumbUp && !isIndexUp && !isMiddleUp) {
                drawSensor(thumb.x * canvas.width, thumb.y * canvas.height, "red", "AKU");
                speak("Aku");
            }
            // 4. Jari Telunjuk - NAMA
            else if (isIndexUp && !isMiddleUp) {
                drawSensor(index.x * canvas.width, index.y * canvas.height, "green", "NAMA");
                speak("Nama");
            }
        }
    });

    const camera = new Camera(document.createElement('video'), {
        onFrame: async () => {
            await hands.send({image: camera.video});
        },
        width: 1280,
        height: 720
    });
    camera.start();
</script>
</body>
</html>
