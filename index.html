<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Jari Interaktif V2</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { position: fixed; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); z-index: 5; }
        #status { position: fixed; top: 10px; left: 10px; color: yellow; z-index: 10; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div id="status">Status: Menghubungkan Kamera...</div>
<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusDiv = document.getElementById('status');

    let lastDetectedAction = "";
    let detectionStartTime = 0;
    const DELAY_TIME = 2000; // Tunggu 2 detik (2000ms) sebelum bicara

    const synth = window.speechSynthesis;

    function speak(text) {
        if (synth.speaking) return;
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'id-ID';
        synth.speak(utter);
    }

    function onResults(results) {
        // Samakan ukuran canvas dengan jendela
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        statusDiv.innerText = "Sensor Siap! Gerakkan Jari Anda";

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            
            // Koordinat Ujung Jari
            const thumb = landmarks[4];
            const index = landmarks[8];
            const middle = landmarks[12];
            const pinky = landmarks[20];

            // Deteksi Jari Terangkat
            const isThumbUp = thumb.y < landmarks[3].y;
            const isIndexUp = index.y < landmarks[6].y;
            const isMiddleUp = middle.y < landmarks[10].y;
            const isPinkyUp = pinky.y < landmarks[18].y;

            let currentAction = "";
            let color = "";
            let text = "";

            // Logika Prioritas
            if (isIndexUp && isMiddleUp && !isPinkyUp) {
                currentAction = "terimakasih"; color = "white"; text = "Terima kasih";
            } else if (isPinkyUp && !isIndexUp) {
                currentAction = "perkenalkan"; color = "yellow"; text = "Perkenalkan";
            } else if (isThumbUp && !isIndexUp) {
                currentAction = "aku"; color = "red"; text = "Aku";
            } else if (isIndexUp && !isMiddleUp) {
                currentAction = "nama"; color = "green"; text = "Nama";
            }

            if (currentAction !== "") {
                // Gambar Sensor Visual
                const activeFinger = currentAction === "terimakasih" ? index : 
                                    (currentAction === "perkenalkan" ? pinky : 
                                    (currentAction === "aku" ? thumb : index));

                drawSensor(activeFinger.x * canvasElement.width, activeFinger.y * canvasElement.height, color, currentAction.toUpperCase());

                // Logika Timer/Delay
                if (lastDetectedAction === currentAction) {
                    let timePassed = Date.now() - detectionStartTime;
                    let timeLeft = Math.max(0, (DELAY_TIME - timePassed) / 1000);
                    
                    statusDiv.innerText = `Tahan jari... (${timeLeft.toFixed(1)}s)`;
                    
                    if (timePassed > DELAY_TIME) {
                        speak(text);
                        detectionStartTime = Date.now() + 5000; // Jeda 5 detik agar tidak spam
                    }
                } else {
                    lastDetectedAction = currentAction;
                    detectionStartTime = Date.now();
                }
            } else {
                lastDetectedAction = "";
            }
        }
    }

    function drawSensor(x, y, color, label) {
        canvasCtx.beginPath();
        canvasCtx.arc(x, y, 50, 0, Math.PI * 2);
        canvasCtx.fillStyle = color;
        canvasCtx.globalAlpha = 0.5;
        canvasCtx.fill();
        canvasCtx.lineWidth = 8;
        canvasCtx.strokeStyle = "white";
        canvasCtx.stroke();
        
        canvasCtx.globalAlpha = 1.0;
        canvasCtx.fillStyle = "white";
        canvasCtx.font = "bold 25px Arial";
        canvasCtx.textAlign = "center";
        canvasCtx.fillText(label, x, y - 70);
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });
    camera.start();
</script>
</body>
</html>
